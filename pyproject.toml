[project]
name = "localflow-agent"
version = "0.6.1"
description = "LocalFlow Agent: Personal Automation Agent Harness"
readme = "README.md"
requires-python = ">=3.11"
authors = [{ name = "LocalFlow" }]
license = { text = "MIT" }
dependencies = [
    "pydantic>=2.6",
    "typer>=0.12",
    "rich>=13.7",
    "pyyaml>=6.0",
    "anthropic>=0.92",
    "python-dotenv>=1.0",
    "pypdf>=4.0",
    "pandas>=2.0",
    "openpyxl>=3.1",
    "matplotlib>=3.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "openai>=1.50",
]
openai = [
    "openai>=1.50",
]
mcp = [
    "mcp>=1.6,<2.0",
]

[project.scripts]
localflow = "app.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra -q"
