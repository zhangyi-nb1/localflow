name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs for the same ref when a new push lands — keeps
# CI minutes used for the latest state, not stale branches.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python }} · ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      # One cell failing should NOT prevent us from seeing how the others
      # fared — useful for diagnosing Windows-only / Python-version-only
      # breakage.
      fail-fast: false
      matrix:
        include:
          # Full Python matrix on Linux — this is the primary signal.
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"
          - os: ubuntu-latest
            python: "3.13"
          # Cross-platform smoke on one Python version each.
          - os: windows-latest
            python: "3.11"
          - os: macos-latest
            python: "3.11"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          # Cache pip downloads keyed by pyproject.toml. Speeds up the
          # heavy installs (pandas / matplotlib / mcp + deps) on warm runs.
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies (project + dev + mcp)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,mcp]"

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Pytest
        run: pytest tests/ examples/external_skill_example/ -v --tb=short

  build:
    name: wheel + sdist build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          pip install build

      - name: Build wheel + sdist
        run: python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 14
