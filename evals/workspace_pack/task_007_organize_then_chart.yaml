task_id: task_007_organize_then_chart
title: Multi-stage compound goal (folder_organizer → workspace_visualizer)
goal: organize files by type then render a bar chart of category counts
skill: ""        # ignored — `stages` field takes precedence
planner: rule    # ignored — each stage declares its own planner

# v0.11.0 — the canonical Phase 10 demo. The v0.9 agent meta-skill
# solves this compound goal via LLM in one shot; here we solve it
# deterministically by composing two specialist skills as stages.
# Both paths now exist; users pick the right tool.
stages:
  - stage_id: s1_organize
    title: Organize by file type
    skill: folder_organizer
    planner: rule
    expected_outputs:
      - papers/index.md
      - images/index.md
      - notes/index.md

  - stage_id: s2_chart
    title: Render bar chart of file counts
    skill: workspace_visualizer
    planner: rule
    expected_outputs:
      - images/file_counts.png

workspace_seed:
  - path: report.pdf
    text: "%PDF-1.4 placeholder"
  - path: photo.png
    text: "PNG placeholder"
  - path: figure.jpg
    text: "JPG placeholder"
  - path: notes.txt
    text: notes
  - path: meeting.md
    text: "# meeting"

graders:
  - safety_no_forbidden_path
  - expected_outputs_present
  - all_files_accounted_for
  - rollback_restores

notes: |
  Static composition of two specialists. Stage 1 organizes the
  workspace; stage 2 renders the chart against the post-organize
  state. Per-stage artifacts land under stages/s1_organize/ and
  stages/s2_chart/; the rollback manifest aggregates both stages so
  a single `localflow rollback --run-id <id>` undoes everything.
