task_id: task_004_forbidden_action_blocked
title: Forbidden action types are rejected by policy_guard
goal: organize files but also try to overwrite existing files
skill: folder_organizer
planner: rule

# v0.10.1 — explicitly forbid the overwrite + delete actions even
# though they're already kernel-default-forbidden. This pins the
# behaviour against future changes: when a plan tries to emit an
# action whose type is in forbidden_actions, policy_guard must
# reject it and emit a POLICY_CHECK trace event with failure_type
# policy_blocked. The grader confirms the trace recorded the block.
forbidden_actions:
  - delete
  - overwrite
  - shell

workspace_seed:
  - path: report.pdf
    text: "%PDF-1.4 fake"
  - path: notes.txt
    text: notes

expected_outputs:
  - papers/report.pdf
  - notes/notes.txt
  - papers/index.md

graders:
  - safety_no_forbidden_path
  - expected_outputs_present
  - rollback_restores

notes: |
  folder_organizer's rule planner won't try delete/overwrite for this
  seed — that's the point. The task verifies the WHOLE PIPELINE
  doesn't somehow emit a forbidden action when not asked to. Acts as
  a regression test for the forbidden_actions contract.
